<style>
:root{--ink:#0A0A0A;--parchment:#FAF7F2;--saffron:#C8A24B;--brass:#B89765;--charcoal:#1F2125;--muted:#6f6a60}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--parchment);font-family:Tajawal;color:var(--ink);min-height:100svh;
  display:flex;flex-direction:column}
.hero{background:var(--ink);color:var(--parchment);padding:55px 21px 55px;text-align:center}
.hero img{width:58px;height:58px;margin-bottom:22px}
.hero .nm{font-size:30px;font-weight:800;line-height:1.3}
.hero .nm-en{font-family:Archivo;direction:ltr;font-size:14px;font-weight:600;color:#d9d4cb;margin-top:4px}
.hero .rl{display:inline-block;margin-top:16px;padding:9px 26px;border:1px solid var(--brass);
  border-radius:14px;font-size:14px;color:var(--saffron);line-height:1.5}
.hero .rl .lt{display:block;font-family:Archivo;direction:ltr;letter-spacing:.22em;font-weight:600;font-size:10px;color:#b9a87e;margin-top:2px}
.wrap{max-width:430px;width:100%;margin:0 auto;padding:34px 21px 21px;flex:1}
.act{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.act a{display:flex;flex-direction:column;align-items:center;gap:7px;text-decoration:none;
  color:var(--ink);background:#fff;border:1px solid rgba(10,10,10,.1);border-radius:14px;
  padding:21px 10px;font-size:14px;font-weight:700;transition:transform .15s, box-shadow .15s}
.act a:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(10,10,10,.08)}
.act svg{width:21px;height:21px;stroke:var(--brass);fill:none;stroke-width:1.6}
.act .full{grid-column:1/-1;flex-direction:row;justify-content:center;background:var(--ink);
  color:var(--parchment)}
.act .full svg{stroke:var(--saffron)}
.num{text-align:center;margin-top:22px;font-family:Archivo;direction:ltr;font-size:16px;
  letter-spacing:.08em;color:var(--charcoal)}
.num a{color:inherit;text-decoration:none}
footer{text-align:center;padding:26px 20px 30px}
footer .l1{font-weight:800;font-size:14.5px}
footer .l2{font-family:Archivo;direction:ltr;font-size:9.5px;letter-spacing:.3em;
  text-transform:uppercase;color:var(--muted);margin-top:3px}
footer a{color:var(--muted);font-family:Archivo;direction:ltr;display:inline-block;
  font-size:11px;letter-spacing:.12em;margin-top:12px;text-decoration:none;
  border-bottom:1px solid var(--brass);padding-bottom:2px}
</style>
</head>
