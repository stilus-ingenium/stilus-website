<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#C9A574">
    <meta name="robots" content="noindex, follow">
    <title>الصفحة غير موجودة — عيادة لافيرا</title>
    <meta name="description" content="الصفحة التي تبحث عنها غير موجودة. عُد للرئيسية أو احجز موعدك مباشرة.">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 20% 30%, rgba(201, 165, 116, 0.18) 0%, transparent 55%),
                radial-gradient(circle at 80% 70%, rgba(232, 213, 186, 0.22) 0%, transparent 55%),
                linear-gradient(135deg, #FAF7F0 0%, #F0E6D2 100%);
            margin: 0;
            padding: 2rem;
        }
        .err-wrap { text-align: center; max-width: 600px; }
        .err-code {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(120px, 22vw, 240px);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #E8D5BA 0%, #C9A574 50%, #8B6730 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: -0.04em;
        }
        .err-title {
            font-family: 'Tajawal', sans-serif;
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 700;
            color: #1f1c17;
            margin: 1rem 0 0.5rem;
        }
        .err-desc {
            font-family: 'Tajawal', sans-serif;
            font-size: 1.15rem;
            color: #5a544a;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }
        .err-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .err-btn {
            padding: 0.95rem 2rem;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .err-btn-primary {
            background: linear-gradient(135deg, #C9A574, #A88553);
            color: white;
            box-shadow: 0 8px 20px rgba(201, 165, 116, 0.35);
        }
        .err-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(201, 165, 116, 0.45); }
        .err-btn-secondary {
            background: white;
            color: #5a544a;
            border: 2px solid #E5DDD0;
        }
        .err-btn-secondary:hover { border-color: #C9A574; color: #1f1c17; }
    </style>
</head>
<body>
    <div class="err-wrap">
        <h1 class="err-code">404</h1>
        <h2 class="err-title">الصفحة غير موجودة</h2>
        <p class="err-desc">يبدو أن الصفحة التي تبحث عنها قد انتقلت أو لم تعد متاحة. خذ لحظة، وعُد لرحلتك معنا.</p>
        <div class="err-actions">
            <a href="index.html" class="err-btn err-btn-primary">العودة للرئيسية</a>
            <a href="/appointment.html" class="err-btn err-btn-secondary">احجز موعد</a>
        </div>
    </div>
</body>
</html>
