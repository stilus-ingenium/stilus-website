    <script>
        (function () {
            var q = new URLSearchParams(location.search);
            var ref = (q.get('ref') || '').trim();
            var input = document.getElementById('refInput');
            if (ref) input.value = ref;
            function go(r) {
                var url = new URL(location.href);
                if (r) url.searchParams.set('ref', r); else url.searchParams.delete('ref');
                history.replaceState(null, '', url);
                window.LaveraBooking.track('trackResult');
            }
            document.getElementById('trackForm').addEventListener('submit', function (e) {
                e.preventDefault(); go(input.value.trim());
            });
            window.LaveraBooking.track('trackResult');
        })();
    </script>
